<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>탑뷰 자동차 피하기</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body {
  width: 100%; height: 100%; background: #111;
  overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  touch-action: none; user-select: none; -webkit-user-select: none;
}
#root {
  display: flex; flex-direction: column; align-items: center;
  width: 100%; height: 100%;
  padding-top: env(safe-area-inset-top, 8px);
  padding-bottom: env(safe-area-inset-bottom, 8px);
  gap: 4px;
}
#hud { width: 100%; display: flex; justify-content: center; gap: 12px; font-size: 12px; color: #aaa; padding: 4px 8px; flex-shrink: 0; }
#hud b { color: #fff; font-weight: 600; }
#lv-wrap { width: 100%; padding: 0 12px; flex-shrink: 0; }
#lv-label { display: flex; justify-content: space-between; font-size: 10px; color: #777; margin-bottom: 2px; }
#lv-label b { color: #bbb; }
#lv-bg { width: 100%; height: 4px; background: #2a2a2a; border-radius: 2px; overflow: hidden; }
#lv-fill { height: 4px; background: #378ADD; border-radius: 2px; transition: width 0.3s; }
#badges { width: 100%; min-height: 18px; display: flex; gap: 6px; justify-content: center; align-items: center; flex-shrink: 0; }
.badge { font-size: 10px; padding: 2px 8px; border-radius: 20px; }
#canvas-wrap { position: relative; flex-shrink: 0; }
canvas { display: block; border-radius: 10px; border: 1px solid #333; }
canvas.gold-mode { box-shadow: 0 0 0 3px #f5c400, 0 0 16px 4px rgba(245,196,0,0.3); border-color: #f5c400; }
.overlay {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 10px; background: rgba(0,0,0,0.65); border-radius: 10px; z-index: 10;
}
.obox {
  background: #222; border: 1px solid #444; border-radius: 12px;
  padding: 16px 18px; width: 82%; max-width: 280px;
  display: flex; flex-direction: column; gap: 10px;
}
.obox h3 { font-size: 15px; font-weight: 600; color: #fff; }
.obox p { font-size: 11px; color: #888; }
.obox input[type=text] {
  width: 100%; padding: 10px 12px; border: 1px solid #555; border-radius: 8px;
  background: #1a1a1a; color: #fff; font-size: 15px; outline: none; -webkit-appearance: none;
}
.obox input[type=text]:focus { border-color: #378ADD; }
.row { display: flex; gap: 8px; }
.btn { padding: 10px 16px; border: 1px solid #555; border-radius: 8px; background: transparent; color: #ccc; font-size: 13px; cursor: pointer; -webkit-appearance: none; }
.btn:active { background: #333; }
.btn-p { background: #1a3a5c; border-color: #378ADD; color: #7dc3ff; }
.btn-p:active { background: #1e4570; }
#ctrl { display: flex; gap: 16px; flex-shrink: 0; width: 100%; padding: 0 16px; justify-content: center; }
.mbtn {
  flex: 1; max-width: 160px; height: 52px;
  border: 1px solid #444; border-radius: 12px; background: #222; color: #fff;
  font-size: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  touch-action: manipulation; -webkit-appearance: none;
}
.mbtn:active { background: #333; }
#rank-panel { width: 100%; padding: 0 12px; flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; min-height: 0; }
#rank-box { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 10px; padding: 8px 12px; }
#rank-box h3 { font-size: 12px; font-weight: 600; color: #fff; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
.rank-status { font-size: 10px; color: #555; font-weight: 400; }
.rrow { display: flex; align-items: center; gap: 8px; padding: 3px 0; border-bottom: 1px solid #222; font-size: 11px; }
.rrow:last-child { border-bottom: none; }
.rnum { width: 20px; text-align: center; color: #555; font-size: 10px; }
.rname { flex: 1; color: #bbb; }
.rscore { font-weight: 600; color: #fff; }
.rme { background: rgba(55,138,221,0.12); border-radius: 4px; }
.rme-gold { background: rgba(245,196,0,0.1); border-radius: 4px; }
</style>
</head>
<body>
<div id="root">
  <div id="hud">
    거리:<b id="s-score">0</b>m &nbsp;
    최고:<b id="s-best">0</b>m &nbsp;
    속도:<b id="s-spd">1.0</b>x &nbsp;
    <span id="s-lives"></span>
  </div>
  <div id="lv-wrap">
    <div id="lv-label"><span>레벨 <b id="s-lv">1</b></span><span>다음 레벨 <b id="s-rem">1000</b>m</span></div>
    <div id="lv-bg"><div id="lv-fill" style="width:0%"></div></div>
  </div>
  <div id="badges"></div>
  <div id="canvas-wrap">
    <canvas id="c"></canvas>
    <div class="overlay" id="overlay">
      <div class="obox" id="box-nick">
        <h3>닉네임 설정</h3>
        <p id="p-saved"></p>
        <input type="text" id="inp-nick" placeholder="닉네임 입력" maxlength="12" autocomplete="off" autocorrect="off" autocapitalize="off"/>
        <div class="row">
          <button class="btn btn-p" style="flex:1" id="btn-start">시작하기</button>
        </div>
        <button class="btn" id="btn-saved" style="display:none">저장된 이름 사용</button>
        <p>❤️ 3개 | 포트홀·충돌 공통 3스트라이크 아웃</p>
      </div>
      <div class="obox" id="box-dead" style="display:none">
        <h3 id="p-title">게임오버!</h3>
        <p id="p-score"></p>
        <p id="p-rank"></p>
        <div class="row">
          <button class="btn btn-p" style="flex:1" id="btn-retry">다시 시작</button>
          <button class="btn" id="btn-changenick">이름 변경</button>
        </div>
      </div>
    </div>
  </div>
  <div id="ctrl">
    <button class="mbtn" id="btn-left">◀</button>
    <button class="mbtn" id="btn-right">▶</button>
  </div>
  <div id="rank-panel">
    <div id="rank-box">
      <h3>🏆 글로벌 TOP 10 <span class="rank-status" id="rank-status">불러오는 중...</span></h3>
      <div id="rank-list"><p style="font-size:11px;color:#555">불러오는 중...</p></div>
    </div>
  </div>
</div>

<script>
// ── Supabase 설정 ──────────────────────────────────────────
var SUPABASE_URL = 'https://gmfbmrlngnfohuapfzvl.supabase.co';
var SUPABASE_KEY = 'sb_publishable_CjdZvJZXdVWCcQHmWxCZTw_0aG8S3Ce';
var TABLE = 'score';

// Supabase REST API 직접 호출 (라이브러리 없이)
async function sbSelect() {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${TABLE}?select=nickname,score&order=score.desc&limit=10`, {
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': 'Bearer ' + SUPABASE_KEY
      }
    });
    if (!res.ok) return [];
    return await res.json();
  } catch(e) { return []; }
}

async function sbInsert(nickname, score) {
  try {
    await fetch(`${SUPABASE_URL}/rest/v1/${TABLE}`, {
      method: 'POST',
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': 'Bearer ' + SUPABASE_KEY,
        'Content-Type': 'application/json',
        'Prefer': 'return=minimal'
      },
      body: JSON.stringify({ nickname, score })
    });
  } catch(e) {}
}

// ── 캔버스 크기 ───────────────────────────────────────────
var canvas = document.getElementById('c');
var ctx = canvas.getContext('2d');
var CW = 300, CH = 450;
var N = 5, LANES = [], PLAYER_Y = 0;

function initSize() {
  var totalH = window.innerHeight;
  var totalW = window.innerWidth;
  var fixedH = 230;
  var availH = totalH - fixedH;
  var availW = totalW - 20;
  var w = Math.min(availW, Math.floor(availH * 0.67));
  var h = Math.floor(w / 0.67);
  if (h > availH) { h = availH; w = Math.floor(h * 0.67); }
  CW = Math.max(w, 220); CH = Math.max(h, 330);
  canvas.width = CW; canvas.height = CH;
  canvas.style.width = CW + 'px'; canvas.style.height = CH + 'px';
  var margin = Math.round(CW * 0.11);
  var lw = (CW - margin * 2) / N;
  LANES = [];
  for (var i = 0; i < N; i++) LANES.push(Math.round(margin + lw * i + lw / 2));
  PLAYER_Y = Math.round(CH * 0.82);
}

// ── 상수 ──────────────────────────────────────────────────
var ECOLS = ['#E24B4A','#BA7517','#7F77DD','#D85A30','#993556'];
var SHIELD_LV = [3,7,12,18,25];
var LEVEL_DIST = 1000, POTHOLE_INT = 480;
var GS = 0.62;
function CRW() { return Math.round(32 * CW / 340); }
function CRH() { return Math.round(52 * CW / 340); }

// ── 게임 상태 ──────────────────────────────────────────────
var state = 'nick';
var pLane = 2, pX, tX;
var score = 0, best = 0, speed = 3, frame = 0;
var lives = 3, stun = 0, invinc = 0;
var enemies = [], holes = [], parts = [], floats = [];
var shields = 0, shPulse = 0, rdOff = 0;
var nick = '', globalRanks = [], lastLv = 0;
var no1 = false, goldDone = false, goldPhase = 0;
var cscale = 1, tcscale = 1;
var no1GlobalScore = 0; // 글로벌 1위 점수

// ── 로컬 저장 ──────────────────────────────────────────────
var SK = 'cdg_v8';
function loadLocal() {
  try { var d = JSON.parse(localStorage.getItem(SK)||'{}'); best = d.best||0; return d.n||''; } catch(e) { return ''; }
}
function saveLocal() {
  try { localStorage.setItem(SK, JSON.stringify({n: nick, best: best})); } catch(e) {}
}

// ── 글로벌 랭킹 ───────────────────────────────────────────
async function loadGlobalRanks() {
  document.getElementById('rank-status').textContent = '불러오는 중...';
  var data = await sbSelect();
  globalRanks = data || [];
  no1GlobalScore = globalRanks.length ? globalRanks[0].score : 0;
  renderRanks();
  document.getElementById('rank-status').textContent = globalRanks.length ? `${globalRanks.length}명 참여` : '';
}

async function submitScore(n, s) {
  await sbInsert(n, s);
  await loadGlobalRanks();
}

function myGlobalRank(n, s) {
  var i = globalRanks.findIndex(function(r){ return r.nickname===n && r.score===s; });
  return i >= 0 ? i+1 : null;
}

function renderRanks() {
  var el = document.getElementById('rank-list');
  if (!globalRanks.length) {
    el.innerHTML = '<p style="font-size:11px;color:#555">아직 기록이 없어요! 첫 주자가 되어보세요 🏁</p>';
    return;
  }
  var m = ['🥇','🥈','🥉'];
  el.innerHTML = globalRanks.slice(0,10).map(function(r,i) {
    var me = r.nickname === nick, fi = i === 0;
    return '<div class="rrow '+(me?(fi?'rme-gold':'rme'):'')+'">'
      +'<span class="rnum">'+(m[i]||(i+1))+'</span>'
      +'<span class="rname">'+(fi?'👑 ':'')+r.nickname+(me?' ★':'')+'</span>'
      +'<span class="rscore">'+r.score+'m</span>'
      +'</div>';
  }).join('');
}

// ── 헬퍼 ──────────────────────────────────────────────────
function lerp(a,b,t) { return a+(b-a)*t; }
function addFloat(x,y,t,c) { floats.push({x:x,y:y,t:t,c:c,life:1,vy:-1.4}); }

function updLives() {
  document.getElementById('s-lives').innerHTML =
    [0,1,2].map(function(i){ return '<span style="opacity:'+(i<lives?1:0.18)+'">❤️</span>'; }).join('');
}
function curLv() { return Math.floor(score/LEVEL_DIST)+1; }
function updHUD() {
  document.getElementById('s-score').textContent = score;
  document.getElementById('s-best').textContent = Math.max(best,score);
  document.getElementById('s-spd').textContent = speed.toFixed(1);
  document.getElementById('s-lv').textContent = curLv();
  document.getElementById('s-rem').textContent = LEVEL_DIST - Math.floor(score%LEVEL_DIST);
  document.getElementById('lv-fill').style.width = ((score%LEVEL_DIST)/LEVEL_DIST*100).toFixed(1)+'%';
}
function updBadges() {
  var b = [];
  if (no1) b.push('<div class="badge" style="background:rgba(245,196,0,0.2);color:#c9a000">👑 글로벌 1위 질주 중!</div>');
  if (shields>0) b.push('<div class="badge" style="background:rgba(55,138,221,0.18);color:#7dc3ff">⚡ 보호막 x'+shields+'</div>');
  if (stun>0) b.push('<div class="badge" style="background:rgba(200,50,50,0.15);color:#ff8080">충격!</div>');
  document.getElementById('badges').innerHTML = b.join('');
}

// ── 레벨업 / 1위 체크 ─────────────────────────────────────
function chkLv() {
  var lv = curLv();
  if (lv > lastLv) {
    lastLv = lv;
    if (lv > 1) {
      if (SHIELD_LV.indexOf(lv) >= 0) { shields++; addFloat(CW/2,CH/2-50,'레벨'+lv+'! 보호막+1','#378ADD'); }
      else addFloat(CW/2,CH/2-50,'레벨 '+lv+'!','#aaa');
    }
  }
}
function chkNo1() {
  var was = no1;
  no1 = no1GlobalScore > 0 && score > no1GlobalScore;
  if (no1 && !was && !goldDone) {
    goldDone = true; tcscale = GS;
    addFloat(CW/2,CH/2-60,'👑 글로벌 1위 등극!','#f5c400');
    addFloat(CW/2,CH/2-38,'황금 레이서 모드','#f5c400');
    canvas.classList.add('gold-mode');
    for (var i=0;i<28;i++) {
      var a=Math.random()*Math.PI*2, sp=3+Math.random()*5;
      parts.push({x:pX,y:PLAYER_Y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,
        c:['#f5c400','#fff','#FFD700','#FFA500'][Math.floor(Math.random()*4)]});
    }
  }
  if (!no1 && was) { tcscale = 1; canvas.classList.remove('gold-mode'); }
}

// ── 그리기 ────────────────────────────────────────────────
function drawRoad() {
  var m = Math.round(CW*0.11);
  ctx.fillStyle='#3a3a3a'; ctx.fillRect(m,0,CW-m*2,CH);
  ctx.fillStyle='#2a2a2a'; ctx.fillRect(0,0,m,CH); ctx.fillRect(CW-m,0,m,CH);
  var th = Math.round(CH*0.072);
  for (var y=(rdOff%(th*2))-th*2; y<CH; y+=th*2) {
    ctx.fillStyle='#4a4a4a';
    ctx.fillRect(2,y,m-4,th); ctx.fillRect(CW-m+2,y,m-4,th);
  }
  ctx.strokeStyle='rgba(160,160,160,0.35)'; ctx.setLineDash([22,14]); ctx.lineWidth=1.5;
  var lw=(CW-m*2)/N;
  for (var i=1;i<N;i++) { var x=m+lw*i; ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,CH);ctx.stroke(); }
  ctx.setLineDash([]);
  ctx.strokeStyle='#888'; ctx.lineWidth=2.5;
  ctx.beginPath();ctx.moveTo(m,0);ctx.lineTo(m,CH);ctx.stroke();
  ctx.beginPath();ctx.moveTo(CW-m,0);ctx.lineTo(CW-m,CH);ctx.stroke();
  if (no1) {
    goldPhase+=0.05;
    var a=0.1+0.08*Math.sin(goldPhase);
    ctx.fillStyle='rgba(245,196,0,'+a+')';
    ctx.fillRect(0,0,m,CH); ctx.fillRect(CW-m,0,m,CH);
    ctx.strokeStyle='rgba(245,196,0,'+(0.28+0.14*Math.sin(goldPhase))+')';
    ctx.lineWidth=2; ctx.setLineDash([]);
    ctx.beginPath();ctx.moveTo(m+2,0);ctx.lineTo(m+2,CH);ctx.stroke();
    ctx.beginPath();ctx.moveTo(CW-m-2,0);ctx.lineTo(CW-m-2,CH);ctx.stroke();
  }
}

function drawPlayer() {
  cscale = lerp(cscale, tcscale, 0.06);
  var w=CRW()*cscale, h=CRH()*cscale, gold=no1;
  if (shields>0) {
    shPulse+=0.08;
    var r=Math.max(w,h)*0.8+Math.sin(shPulse)*3;
    ctx.save();
    ctx.strokeStyle='rgba('+(gold?'245,196,0':'55,138,221')+','+(0.6+0.3*Math.sin(shPulse))+')';
    ctx.lineWidth=2.5;
    ctx.beginPath();ctx.ellipse(pX,PLAYER_Y,r+2,r+5,0,0,Math.PI*2);ctx.stroke();
    for (var i=0;i<6;i++) {
      var a=(i/6)*Math.PI*2+shPulse*0.5;
      ctx.fillStyle='rgba('+(gold?'255,215,0':'100,180,255')+','+(0.5+0.5*Math.sin(shPulse+i))+')';
      ctx.beginPath();ctx.arc(pX+Math.cos(a)*(r+5),PLAYER_Y+Math.sin(a)*(r+6),2,0,Math.PI*2);ctx.fill();
    }
    ctx.restore();
  }
  var sx = stun>0?(Math.random()-0.5)*4:0;
  ctx.save(); ctx.translate(pX+sx, PLAYER_Y);
  if (invinc>0 && Math.floor(invinc/4)%2===0) ctx.globalAlpha=0.35;
  ctx.fillStyle = gold?'#f5c400':'#378ADD';
  ctx.beginPath();ctx.roundRect(-w/2,-h/2,w,h,4);ctx.fill();
  if (gold) { ctx.strokeStyle='#FFD700';ctx.lineWidth=1.5;ctx.beginPath();ctx.roundRect(-w/2,-h/2,w,h,4);ctx.stroke(); }
  ctx.fillStyle = gold?'rgba(255,255,200,0.85)':'#b0e8ff';
  ctx.fillRect(-w/2+3,-h/2+5,w-6,h*0.2);
  ctx.fillRect(-w/2+3,h/2-h*0.22,w-6,h*0.18);
  ctx.fillStyle='#111';
  var tw=5*cscale, th2=4*cscale;
  [[-w/2+1,-h/2+1],[w/2-tw-1,-h/2+1],[-w/2+1,h/2-th2-1],[w/2-tw-1,h/2-th2-1]].forEach(function(p){ctx.fillRect(p[0],p[1],tw,th2);});
  ctx.fillStyle=gold?'rgba(255,240,100,0.95)':'rgba(255,255,120,0.9)';
  ctx.beginPath();ctx.ellipse(-w/2+3,-h/2-4,3*cscale,2*cscale,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(w/2-3,-h/2-4,3*cscale,2*cscale,0,0,Math.PI*2);ctx.fill();
  if (gold) { ctx.font=Math.round(12*cscale)+'px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('👑',0,-h/2-10*cscale); }
  ctx.restore();
}

function drawEnemy(e) {
  var w=CRW(), h=CRH();
  ctx.save();ctx.translate(e.x,e.y);
  ctx.fillStyle=e.c;ctx.beginPath();ctx.roundRect(-w/2,-h/2,w,h,5);ctx.fill();
  ctx.fillStyle='#ccc';ctx.fillRect(-w/2+4,-h/2+7,w-8,10);ctx.fillRect(-w/2+4,h/2-17,w-8,10);
  ctx.fillStyle='#111';
  [[-w/2+2,-h/2+2],[w/2-8,-h/2+2],[-w/2+2,h/2-8],[w/2-8,h/2-8]].forEach(function(p){ctx.fillRect(p[0],p[1],6,5);});
  ctx.restore();
}

function drawHole(ph) {
  var sc=CW/340;
  ctx.save();ctx.translate(ph.x,ph.y);
  ctx.fillStyle='#1a1a1a';ctx.beginPath();ctx.ellipse(0,0,19*sc,12*sc,0,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#444';ctx.lineWidth=1.5;ctx.setLineDash([3,3]);
  ctx.beginPath();ctx.ellipse(0,0,19*sc,12*sc,0,0,Math.PI*2);ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle='#2a2a2a';ctx.beginPath();ctx.ellipse(-4*sc,-2*sc,7*sc,4*sc,0.3,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

function addParts(x,y,c) {
  for (var i=0;i<12;i++) {
    var a=Math.random()*Math.PI*2, sp=2+Math.random()*4;
    parts.push({x:x,y:y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,c:c||'#E24B4A'});
  }
}

function spawnE() {
  var l=Math.floor(Math.random()*N);
  enemies.push({x:LANES[l],y:-CRH(),c:ECOLS[Math.floor(Math.random()*ECOLS.length)],sp:speed*(0.7+Math.random()*0.7)});
}
function spawnH() {
  var l=Math.floor(Math.random()*N);
  holes.push({x:LANES[l],y:-20,sp:speed*0.42});
}

function takeDmg(reason,x,y) {
  if (invinc>0) return;
  if (shields>0) {
    shields--;
    addFloat(pX,PLAYER_Y-30,'보호막 흡수!','#378ADD');
    addParts(x,y,'#378ADD'); invinc=70; return;
  }
  lives--; updLives(); stun=45; invinc=100;
  addParts(pX,PLAYER_Y,'#E24B4A');
  if (lives<=0) { addFloat(pX,PLAYER_Y-30,'아웃!','#E24B4A'); die(reason); }
  else addFloat(pX,PLAYER_Y-30,'❤️ '+lives+'개 남음','#E24B4A');
}

function chkHoles() {
  if (invinc>0) return;
  var hw=(no1?CRW()*GS:CRW())*0.55+10;
  var hh=(no1?CRH()*GS:CRH())*0.32+6;
  for (var i=holes.length-1;i>=0;i--) {
    var h=holes[i];
    if (Math.abs(h.x-pX)<hw && Math.abs(h.y-PLAYER_Y)<hh) { holes.splice(i,1); takeDmg('포트홀',h.x,h.y); break; }
  }
}
function chkEnemies() {
  if (invinc>0) return;
  var hw=no1?(CRW()*GS+CRW())/2-5:CRW()-3;
  var hh=no1?(CRH()*GS+CRH())/2-5:CRH()-4;
  for (var i=enemies.length-1;i>=0;i--) {
    var e=enemies[i];
    if (Math.abs(e.x-pX)<hw && Math.abs(e.y-PLAYER_Y)<hh) { enemies.splice(i,1); takeDmg('충돌',e.x,e.y); break; }
  }
}

function die(reason) {
  state='dead';
  if (score>best) { best=score; saveLocal(); }
  // 글로벌 점수 저장
  submitScore(nick, score).then(function() {
    var rk = myGlobalRank(nick, score);
    document.getElementById('p-rank').textContent = rk&&rk<=10?'🏆 글로벌 '+rk+'위!':'현재 순위: '+(rk||'집계 중')+'위';
  });
  canvas.classList.remove('gold-mode');
  document.getElementById('p-title').textContent = reason==='포트홀'?'포트홀에 빠졌어요!':'충돌 게임오버!';
  document.getElementById('p-score').textContent = nick+'님 기록: '+score+'m';
  document.getElementById('p-rank').textContent = '순위 집계 중...';
  document.getElementById('box-dead').style.display='';
  document.getElementById('box-nick').style.display='none';
  document.getElementById('overlay').style.display='flex';
}

function render() {
  ctx.clearRect(0,0,CW,CH);
  drawRoad();
  holes.forEach(function(h){drawHole(h);});
  enemies.forEach(function(e){drawEnemy(e);});
  drawPlayer();
  parts.forEach(function(p){ctx.save();ctx.globalAlpha=p.life;ctx.fillStyle=p.c;ctx.beginPath();ctx.arc(p.x,p.y,4,0,Math.PI*2);ctx.fill();ctx.restore();});
  floats.forEach(function(f){ctx.save();ctx.globalAlpha=f.life;ctx.fillStyle=f.c;ctx.font='bold '+Math.round(13*CW/340)+'px sans-serif';ctx.textAlign='center';ctx.fillText(f.t,f.x,f.y);ctx.restore();});
}

function loop() {
  if (state!=='playing') return;
  frame++; rdOff+=speed; speed=3+score/380;
  if (stun>0) stun--; if (invinc>0) invinc--;
  pX=lerp(pX,tX,stun>0?0.04:0.2);
  var sr=Math.max(14,50-Math.floor(score/150));
  if (frame%sr===0) spawnE();
  if (frame%POTHOLE_INT===0) spawnH();
  chkLv(); chkNo1();
  enemies.forEach(function(e){e.y+=e.sp;});
  holes.forEach(function(h){h.y+=h.sp;});
  enemies=enemies.filter(function(e){return e.y<CH+CRH();});
  holes=holes.filter(function(h){return h.y<CH+20;});
  parts.forEach(function(p){p.x+=p.vx;p.y+=p.vy;p.vx*=0.88;p.vy*=0.88;p.life-=0.05;});
  parts=parts.filter(function(p){return p.life>0;});
  floats.forEach(function(f){f.y+=f.vy;f.life-=0.022;});
  floats=floats.filter(function(f){return f.life>0;});
  if (state==='playing') chkHoles();
  if (state==='playing') chkEnemies();
  if (state==='playing') { score++; updHUD(); updBadges(); render(); requestAnimationFrame(loop); }
  else render();
}

function showNick() {
  document.getElementById('overlay').style.display='flex';
  document.getElementById('box-nick').style.display='';
  document.getElementById('box-dead').style.display='none';
  var sv = loadLocal();
  if (sv) { document.getElementById('p-saved').textContent='저장된 이름: '+sv; document.getElementById('btn-saved').style.display=''; }
  else { document.getElementById('p-saved').textContent=''; document.getElementById('btn-saved').style.display='none'; }
}

function startGame() {
  pLane=2; pX=LANES[2]; tX=LANES[2];
  score=0; speed=3; frame=0; lives=3; stun=0; invinc=0;
  enemies=[]; holes=[]; parts=[]; floats=[];
  shields=0; lastLv=0; shPulse=0;
  no1=false; goldDone=false; goldPhase=0;
  cscale=1; tcscale=1;
  canvas.classList.remove('gold-mode');
  updLives(); updHUD();
  document.getElementById('badges').innerHTML='';
  document.getElementById('overlay').style.display='none';
  state='playing';
  loop();
}

document.getElementById('btn-start').addEventListener('click', function(){
  var v=document.getElementById('inp-nick').value.trim();
  if (!v) { document.getElementById('inp-nick').focus(); return; }
  nick=v; saveLocal(); startGame();
});
document.getElementById('inp-nick').addEventListener('keydown', function(e){
  if (e.key==='Enter') { var v=this.value.trim(); if(!v) return; nick=v; saveLocal(); startGame(); }
});
document.getElementById('btn-saved').addEventListener('click', function(){
  var sv=loadLocal(); if(sv){nick=sv;startGame();}
});
document.getElementById('btn-retry').addEventListener('click', function(){
  document.getElementById('overlay').style.display='none'; startGame();
});
document.getElementById('btn-changenick').addEventListener('click', function(){
  state='nick'; showNick();
});

document.addEventListener('keydown',function(e){
  if(state!=='playing') return;
  if(e.key==='ArrowLeft'&&pLane>0){pLane--;tX=LANES[pLane];}
  if(e.key==='ArrowRight'&&pLane<N-1){pLane++;tX=LANES[pLane];}
});

function moveL(){if(state==='playing'&&pLane>0){pLane--;tX=LANES[pLane];}}
function moveR(){if(state==='playing'&&pLane<N-1){pLane++;tX=LANES[pLane];}}

document.getElementById('btn-left').addEventListener('touchstart',function(e){e.preventDefault();moveL();},{passive:false});
document.getElementById('btn-right').addEventListener('touchstart',function(e){e.preventDefault();moveR();},{passive:false});
document.getElementById('btn-left').addEventListener('click',moveL);
document.getElementById('btn-right').addEventListener('click',moveR);

var swX=0;
canvas.addEventListener('touchstart',function(e){swX=e.touches[0].clientX;},{passive:true});
canvas.addEventListener('touchend',function(e){
  if(state!=='playing') return;
  var dx=e.changedTouches[0].clientX-swX;
  if(Math.abs(dx)>25){if(dx<0)moveL();else moveR();}
},{passive:true});

// ── 초기화 ────────────────────────────────────────────────
initSize();
window.addEventListener('resize',function(){
  initSize();
  if(state==='playing'){pX=LANES[pLane];tX=LANES[pLane];}
  if(state!=='playing') render();
});

var savedNick = loadLocal();
nick = savedNick;
loadGlobalRanks();
showNick();
render();
ctx.fillStyle='rgba(0,0,0,0.55)'; ctx.fillRect(0,0,CW,CH);
ctx.fillStyle='#fff'; ctx.font='bold '+Math.round(18*CW/340)+'px sans-serif'; ctx.textAlign='center';
ctx.fillText('탑뷰 자동차 피하기',CW/2,CH/2-14);
ctx.font=Math.round(11*CW/340)+'px sans-serif'; ctx.fillStyle='#aaa';
ctx.fillText('글로벌 랭킹 연동!',CW/2,CH/2+8);
ctx.fillText('1위 달성 시 황금 레이서 모드!',CW/2,CH/2+24);
</script>
</body>
</html>
